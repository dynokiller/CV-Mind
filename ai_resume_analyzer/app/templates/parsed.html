{% extends "layout.html" %}
{% block content %}

<div class="parsed-header">
  <h2><i class="fa-solid fa-file-circle-check"></i> Parsed Resumes</h2>
  <button class="add-btn"><i class="fa-solid fa-plus"></i> Add Resume</button>
</div>

<div class="parsed-table">
  <table>
    <thead>
      <tr>
        <th>Candidate</th>
        <th>Email</th>
        <th>Status</th>
        <th>Match</th>
        <th>Actions</th>
      </tr>
    </thead>
    <tbody>
      <tr>
        <td>Jane Doe</td>
        <td>jane@gmail.com</td>
        <td><span class="status success">Parsed</span></td>
        <td>92%</td>
        <td><button class="small-btn">View</button></td>
      </tr>
      <tr>
        <td>John Smith</td>
        <td>john@gmail.com</td>
        <td><span class="status pending">Pending</span></td>
        <td>65%</td>
        <td><button class="small-btn">View</button></td>
      </tr>
    </tbody>
  </table>
</div>

{% endblock %}
