<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign Up - Resume Analyzer</title>

     <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="{{ url_for('static', filename='../static/images/squre_logo1.png') }}?v=2"
    />
    
    <!-- Base CSS -->
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='css/signup.css') }}"
    />

    <!-- Local Font Awesome 7.2.0 -->
    <link
      rel="preload"
      href="{{ url_for('static', filename='css/fontawesome-free-7.2.0-web/css/all.min.css') }}"
      as="style"
      onload="
        this.onload = null;
        this.rel = 'stylesheet';
      "
    />

    <noscript>
      <link
        rel="stylesheet"
        href="{{ url_for('static', filename='../static/fontawesome-free-7.2.0-web/css/all.min.css') }}"
      />
    </noscript>

    <!-- Preload Fonts (Removes Icon Flicker Completely) -->
    <link
      rel="preload"
      href="{{ url_for('static', filename='../static/css/fontawesome-free-7.2.0-web/webfonts/fa-solid-900.woff2') }}"
      as="font"
      type="font/woff2"
      crossorigin
    />

    <link
      rel="preload"
      href="{{ url_for('static', filename='../static/css/fontawesome-free-7.2.0-web/webfonts/fa-regular-400.woff2') }}"
      as="font"
      type="font/woff2"
      crossorigin
    />
  </head>

  <body>
    <div class="signup">
      <div class="signup-container">
        <div class="signup-card">
          <div class="signup-logo">
            <img
              src="{{ url_for('static', filename='images/tranperent_logo.png') }}"
            />
            <!-- <h2>CVMIND</h2> -->
          </div>
          <h2 class="signup-title">Create Account</h2>

          <!-- Flash Messages -->
          {% with messages = get_flashed_messages(with_categories=true) %} {% if
          messages %}
          <div class="signup-flash-box">
            {% for category, message in messages %}

            <div
              class="signup-alert {% if category == 'success' %}success{% else %}error{% endif %}"
            >
              {{ message }}
            </div>

            {% endfor %}
          </div>
          {% endif %} {% endwith %}

          <form id="signupForm" method="POST" action="{{ url_for('signup') }}">
            <div class="signup-input-group">
              <label><i class="fa-solid fa-user"></i> Full Name</label>
              <input
                type="text"
                id="name"
                name="name"
                placeholder="Enter full name"
                required
              />
            </div>

            <div class="signup-input-group">
              <label><i class="fa-solid fa-envelope"></i> Email</label>
              <input
                type="email"
                id="email"
                name="email"
                placeholder="Enter email address"
                required
              />
            </div>

            <div class="signup-input-group">
              <label><i class="fa-solid fa-lock"></i> Password</label>

              <div class="signup-password">
                <input
                  type="password"
                  id="password"
                  name="password"
                  placeholder="Create password"
                  required
                />

                <i id="togglePassword" class="fa-solid fa-eye"></i>
              </div>
            </div>

            <button
              id="signupBtn"
              type="submit"
              class="signup-btn signup-btn-primary"
            >
              <i class="fa-solid fa-check"></i>
              Sign Up
            </button>
          </form>

          <p class="signup-link-text">
            Already have an account?
            <a href="{{ url_for('signin') }}">Sign In</a>
          </p>
        </div>
      </div>
    </div>

    <script>
      const passwordInput = document.getElementById("password");
      const togglePassword = document.getElementById("togglePassword");

      togglePassword.addEventListener("click", function () {
        const type =
          passwordInput.getAttribute("type") === "password"
            ? "text"
            : "password";

        passwordInput.setAttribute("type", type);

        this.classList.toggle("fa-eye");
        this.classList.toggle("fa-eye-slash");
      });

      setTimeout(() => {
        const alerts = document.querySelectorAll(".signup-alert");

        alerts.forEach((alert) => {
          alert.style.display = "none";
        });
      }, 3000);

      document
        .getElementById("signupForm")
        .addEventListener("submit", function () {
          const signupBtn = document.getElementById("signupBtn");

          signupBtn.disabled = true;

          signupBtn.innerHTML =
            '<i class="fa-solid fa-spinner fa-spin"></i> Creating account...';
        });
    </script>
  </body>
</html>
