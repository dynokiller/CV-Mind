<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign In - Resume Analyzer</title>

    <!-- Base CSS -->
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='css/style.css') }}"
    />

    <!-- Local Font Awesome 7.2.0 -->
    <link
      rel="preload"
      href="{{ url_for('static', filename='../static/css/fontawesome-free-7.2.0-web/css/all.min.css') }}"
      as="style"
      onload="
        this.onload = null;
        this.rel = 'stylesheet';
      "
    />

    <noscript>
      <link
        rel="stylesheet"
        href="{{ url_for('static', filename='../static/css/fontawesome-free-7.2.0-web/css/all.min.css') }}"
      />
    </noscript>

    <link
      rel="preload"
      href="{{ url_for('static', filename='../static/css/fontawesome-free-7.2.0-web/webfonts/fa-solid-900.woff2') }}"
      as="font"
      type="font/woff2"
      crossorigin
    />

    <script src="https://www.google.com/recaptcha/api.js" async defer></script>
  </head>

  <body>
    <div class="container">
      <div class="card form-box">
        <!-- Logo Area -->
        <div
          class="logo-area"
          style="justify-content: center; margin-bottom: 16px"
        >
          <img
            src="{{ url_for('static', filename='images/logo.png') }}"
            alt="logo"
          />
          <h2>CVMIND</h2>
        </div>

        <h2>Sign In</h2>

        {% with messages = get_flashed_messages(with_categories=true) %} {% if
        messages %} {% for category, message in messages %}
        <div class="alert {{ category }}">{{ message }}</div>
        {% endfor %} {% endif %} {% endwith %}

        <div id="clientErrorContainer"></div>

        <!-- Sign In Form -->
        <form id="signinForm" method="POST" action="{{ url_for('signin') }}">
          <div class="input-group">
            <label><i class="fa-solid fa-envelope"></i> Email</label>
            <input
              type="email"
              id="email"
              name="email"
              placeholder="Enter your email"
              required
            />
          </div>

          <div class="input-group" style="position: relative">
            <label><i class="fa-solid fa-lock"></i> Password</label>

            <input
              type="password"
              id="password"
              name="password"
              placeholder="Enter your password"
              required
            />

            <i id="togglePassword" class="fa-solid fa-eye"></i>
          </div>

          <div class="forgot-password">
            <a href="{{ url_for('forgot_password') }}"> Forgot password? </a>
          </div>

          <button
            id="signinBtn"
            class="g-recaptcha btn btn-primary"
            data-sitekey="{{ recaptcha_site_key }}"
            data-callback="onSubmit"
            data-action="signin"
            style="width: 100%"
          >
            <i class="fa-solid fa-right-to-bracket"></i>
            Sign In
          </button>
        </form>

        <a href="{{ url_for('dev_login') }}" style="text-decoration: none; margin-bottom: 10px;">
          <button type="button" class="google-btn" style="background: #333; color: white;">
            <i class="fa-solid fa-code"></i>
            Dev Login (Bypass)
          </button>
        </a>

        <a href="{{ url_for('google_login') }}" style="text-decoration: none">
          <button type="button" class="google-btn">
            <img
              src="https://www.svgrepo.com/show/475656/google-color.svg"
              alt="google"
            />
            Continue with Google
          </button>
        </a>

        <p class="link-text">
          Don't have an account?
          <a href="{{ url_for('signup') }}">Sign Up</a>
        </p>
      </div>
    </div>

    <script>
      const form = document.getElementById("signinForm");
      const emailInput = document.getElementById("email");
      const passwordInput = document.getElementById("password");
      const signinBtn = document.getElementById("signinBtn");
      const errorContainer = document.getElementById("clientErrorContainer");
      const togglePassword = document.getElementById("togglePassword");

      togglePassword.addEventListener("click", function () {
        const type =
          passwordInput.getAttribute("type") === "password"
            ? "text"
            : "password";

        passwordInput.setAttribute("type", type);

        // Toggle eye icon
        this.classList.toggle("fa-eye");
        this.classList.toggle("fa-eye-slash");
      });
      function showFlashError(message) {
        errorContainer.innerHTML = `
      <div class="alert error">
        ${message}
      </div>
    `;

        setTimeout(() => {
          errorContainer.innerHTML = "";
        }, 3000);
      }

      function isValidEmail(email) {
        const regex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
        return regex.test(email);
      }

      // 🔹 Validate BEFORE reCAPTCHA runs
      signinBtn.addEventListener("click", function (e) {
        const email = emailInput.value.trim();
        const password = passwordInput.value.trim();

        errorContainer.innerHTML = "";

        if (!email) {
          e.preventDefault();
          showFlashError("Please enter your email.");
          return false;
        }

        if (!password) {
          e.preventDefault();
          showFlashError("Please enter your password.");
          return false;
        }

        if (!isValidEmail(email)) {
          e.preventDefault();
          showFlashError("Please enter a valid email address.");
          return false;
        }

        // If validation passes, reCAPTCHA will proceed automatically
      });

      // 🔹 Called AFTER reCAPTCHA success
      function onSubmit(token) {
        const email = emailInput.value.trim();
        const password = passwordInput.value.trim();

        if (!email || !password || !isValidEmail(email)) {
          return;
        }

        signinBtn.disabled = true;

        signinBtn.classList.add("btn-loading");
        signinBtn.innerHTML =
          '<i class="fa-solid fa-spinner fa-spin-pulse"></i> Signing in...';

        form.submit();
      }
    </script>
  </body>
</html>
