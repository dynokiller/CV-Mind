services:
  # Flask Frontend Dashboard — deployed on Render free tier
  - type: web
    name: cv-mind-frontend
    env: python
    plan: free
    region: oregon
    rootDir: ai_resume_analyzer/app
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --workers 2 --timeout 120 --bind 0.0.0.0:$PORT
    autoDeploy: false
    envVars:
      - key: MONGO_URI
        value: mongodb+srv://cvmind:1AbRGPod5SvlSHmh@cluster0.n5qdfmp.mongodb.net/?appName=Cluster0
      - key: MONGO_DBNAME
        value: Resume_any
      # HuggingFace Space backend — handles all ML inference
      - key: PARSERAI_URL
        value: https://dyno0126-cv-mind-analyzer.hf.space/upload-analyze

      - key: FLASK_SECRET_KEY
        generateValue: true

      # Google OAuth — set manually in Render dashboard
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false

      # reCAPTCHA — set manually in Render dashboard
      - key: RECAPTCHA_SITE_KEY
        sync: false
      - key: RECAPTCHA_SECRET_KEY
        sync: false

      # Email service — set manually in Render dashboard
      - key: SENDMAIL_API_URL
        sync: false
